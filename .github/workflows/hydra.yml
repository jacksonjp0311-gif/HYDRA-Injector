name: HYDRA Injector Gate

on:
  push:
  pull_request:

jobs:
  hydra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Test
        run: python -m pytest

      - name: Run HYDRA demo spec
        run: hydra-inject run examples/demo_spec.json

      - name: Verify codeweave spec
        run: hydra-inject code-verify examples/code_injection_spec.json

      - name: Dry-run code apply
        run: hydra-inject code-apply examples/code_injection_spec.json --dry-run

      - name: Render HTML review
        run: hydra-inject code-bundle examples/code_bundle_spec.json --format html > hydra-codeweave-review.html

      - name: Discover governed markers
        run: hydra-inject markers . --slots-only --format json
